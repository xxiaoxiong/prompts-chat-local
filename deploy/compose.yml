services:
  db:
    image: promptschat-db:offline
    restart: unless-stopped
    environment:
      POSTGRES_USER: prompts
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-prompts}"
      POSTGRES_DB: prompts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompts -d prompts"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    image: promptschat-app:offline
    restart: unless-stopped
    ports:
      - "${PORT:-4444}:3000"
    environment:
      DATABASE_URL: "postgresql://prompts:${POSTGRES_PASSWORD:-prompts}@db:5432/prompts?schema=public"
      DIRECT_URL: "postgresql://prompts:${POSTGRES_PASSWORD:-prompts}@db:5432/prompts?schema=public"
      NODE_ENV: production
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${APP_URL:-http://172.16.80.250:4444}"
      NEXTAUTH_URL: "${APP_URL:-http://172.16.80.250:4444}"
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
